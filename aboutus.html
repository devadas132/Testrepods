
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Instagram Unfollower Checker</title>
  <style>
    body {
      font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
      background-color: #fafafa;
      margin: 0;
      padding: 20px;
    }

    .container {
      max-width: 500px;
      margin: auto;
      background: white;
      border-radius: 8px;
      box-shadow: 0 0 10px rgba(0,0,0,0.05);
      padding: 20px;
    }

    h1 {
      color: #262626;
      font-size: 20px;
      text-align: center;
      margin-bottom: 10px;
    }

    label {
      display: block;
      margin-top: 15px;
      font-weight: bold;
    }

    input[type="file"] {
      margin-top: 5px;
      width: 100%;
    }

    button {
      margin-top: 20px;
      background-color: #0095f6;
      color: white;
      border: none;
      padding: 10px 15px;
      border-radius: 4px;
      cursor: pointer;
      width: 100%;
      font-size: 16px;
    }

    button:hover {
      background-color: #0077cc;
    }

    ul {
      list-style-type: none;
      padding-left: 0;
      margin-top: 20px;
    }

    li {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 10px 0;
      border-bottom: 1px solid #eee;
    }

    .username {
      color: #262626;
      word-break: break-all;
      font-size: 14px;
      flex-grow: 1;
      cursor: pointer;
      text-decoration: none;
    }

    .username:hover {
      text-decoration: underline;
    }

    .copy-btn {
      background-color: #efefef;
      color: #333;
      border: none;
      padding: 6px 10px;
      margin-left: 10px;
      border-radius: 4px;
      cursor: pointer;
      font-size: 12px;
      min-width: 60px; /* Fixed width */
      text-align: center;
    }

    .copy-btn:hover {
      background-color: #ddd;
    }

    .footer {
      text-align: center;
      margin-top: 40px;
      font-size: 12px;
      color: #aaa;
    }

    @media (max-width: 480px) {
      .copy-btn {
        font-size: 11px;
        min-width: 50px;
      }
    }
  </style>
</head>
<body>

<div class="container">
  <h1>About us</h1>

 
</div>

<div class="footer">
  
</div>


</body>
</html>
