<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Instagram Not Following Back</title>

<style>
  body {
    font-family: Arial;
    margin: 0;
    padding: 15px;
    background: #f5f5f5;
  }

  h2 { text-align: center; }

  .card {
    background: white;
    padding: 15px;
    border-radius: 12px;
    box-shadow: 0 2px 8px rgba(0,0,0,0.1);
    max-width: 600px;
    margin: auto;
  }

  input {
    width: 100%;
    padding: 12px;
    margin-top: 10px;
    font-size: 16px;
    box-sizing: border-box;
  }

  .main-btn {
    width: 100%;
    padding: 12px;
    margin-top: 10px;
    font-size: 16px;
    background: #007bff;
    color: white;
    border: none;
    border-radius: 8px;
  }

  ul {
    list-style: none;
    padding: 0;
  }

  li {
    display: flex;
    justify-content: space-between;
    align-items: center;
    background: #fafafa;
    margin-top: 8px;
    padding: 10px;
    border-radius: 8px;
    word-break: break-word;
  }

  .copy-btn {
    padding: 6px 10px;
    font-size: 12px;
    background: #28a745;
    color: white;
    border: none;
    border-radius: 6px;
  }

  /* 🔥 Toast message */
  .toast {
    position: fixed;
    bottom: 20px;
    left: 50%;
    transform: translateX(-50%);
    background: black;
    color: white;
    padding: 10px 15px;
    border-radius: 8px;
    font-size: 14px;
    opacity: 0;
    transition: 0.3s;
    pointer-events: none;
  }

  .toast.show {
    opacity: 1;
  }
</style>
</head>

<body>

<div class="card">

<h2>Instagram Checker</h2>

<input type="file" id="followersFile" accept=".json">
<input type="file" id="followingFile" accept=".json">

<button class="main-btn" onclick="compare()">Find Not Following Back</button>

<h3>❌ Not Following You Back</h3>
<ul id="notBack"></ul>

</div>

<!-- Toast -->
<div id="toast" class="toast">Copied</div>

<script>
function showToast(msg) {
  const toast = document.getElementById("toast");
  toast.textContent = msg;
  toast.classList.add("show");

  setTimeout(() => {
    toast.classList.remove("show");
  }, 1200);
}

function extractFollowers(data) {
  const users = new Set();

  data.forEach(item => {
    const list = item?.string_list_data;
    if (Array.isArray(list) && list[0]?.value) {
      users.add(list[0].value);
    }
  });

  return users;
}

function extractFollowing(data) {
  const users = new Set();

  const list = data?.relationships_following || [];

  list.forEach(item => {
    if (item?.title) {
      users.add(item.title);
    }
  });

  return users;
}

function readFile(file) {
  return new Promise((resolve, reject) => {
    const reader = new FileReader();

    reader.onload = e => {
      try {
        resolve(JSON.parse(e.target.result));
      } catch (err) {
        reject(err);
      }
    };

    reader.onerror = reject;
    reader.readAsText(file);
  });
}

function copyText(text) {
  navigator.clipboard.writeText(text);
  showToast("Copied @" + text);
}

async function compare() {
  const f1 = document.getElementById("followersFile").files[0];
  const f2 = document.getElementById("followingFile").files[0];

  if (!f1 || !f2) {
    alert("Please upload both files");
    return;
  }

  const followersJSON = await readFile(f1);
  const followingJSON = await readFile(f2);

  const followers = extractFollowers(followersJSON);
  const following = extractFollowing(followingJSON);

  const notBack = [...following].filter(u => !followers.has(u));

  const list = document.getElementById("notBack");
  list.innerHTML = "";

  if (notBack.length === 0) {
    list.innerHTML = "<li>Everyone follows you back 🎉</li>";
    return;
  }

  notBack.forEach(u => {
    const li = document.createElement("li");

    li.innerHTML = `
      <span>@${u}</span>
      <button class="copy-btn" onclick="copyText('${u}')">Copy</button>
    `;

    list.appendChild(li);
  });
}
</script>

</body>
</html>
