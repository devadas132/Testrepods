<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Instagram Unfollower Checker</title>

  <style>
    body {
      font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
      background-color: #fafafa;
      margin: 0;
      padding: 20px;
    }

    .container {
      max-width: 500px;
      margin: auto;
      background: white;
      border-radius: 8px;
      box-shadow: 0 0 10px rgba(0,0,0,0.05);
      padding: 20px;
    }

    h1 {
      color: #262626;
      font-size: 20px;
      text-align: center;
      margin-bottom: 10px;
    }

    label {
      display: block;
      margin-top: 15px;
      font-weight: bold;
    }

    input[type="file"] {
      margin-top: 5px;
      width: 100%;
    }

    button {
      margin-top: 20px;
      background-color: #0095f6;
      color: white;
      border: none;
      padding: 10px 15px;
      border-radius: 4px;
      cursor: pointer;
      width: 100%;
      font-size: 16px;
    }

    button:hover {
      background-color: #0077cc;
    }

    ul {
      list-style-type: none;
      padding-left: 0;
      margin-top: 20px;
    }

    li {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 10px 0;
      border-bottom: 1px solid #eee;
      gap: 10px;
    }

    .username {
      color: #262626;
      word-break: break-all;
      font-size: 14px;
      flex-grow: 1;
      text-decoration: none;
    }

    .username:hover {
      text-decoration: underline;
    }

    .copy-btn {
      background-color: #efefef;
      color: #333;
      border: none;
      padding: 6px 10px;
      border-radius: 4px;
      cursor: pointer;
      font-size: 12px;
      min-width: 60px;
      text-align: center;
    }

    .copy-btn:hover {
      background-color: #ddd;
    }

    .footer {
      text-align: center;
      margin-top: 40px;
      font-size: 12px;
      color: #aaa;
    }

    .message {
      text-align: center;
      margin-top: 20px;
      font-weight: bold;
      color: #555;
    }

    @media (max-width: 480px) {
      .copy-btn {
        font-size: 11px;
        min-width: 50px;
      }
    }
  </style>
</head>

<body>

<div class="container">

  <a href="aboutus.html">About</a>

  <h1>Instagram Unfollower Checker</h1>

  <label for="followers">
    Upload followers_1.json:
  </label>

  <input type="file" id="followers" accept=".json">

  <label for="following">
    Upload following.json:
  </label>

  <input type="file" id="following" accept=".json">

  <button onclick="checkUnfollows()">
    Check Who Doesn't Follow Back
  </button>

  <div class="message" id="message"></div>

  <ul id="result"></ul>

</div>

<div class="footer">
  Instagram Unfollower Checker
</div>

<script>

async function checkUnfollows() {

  const followersFile =
    document.getElementById('followers').files[0];

  const followingFile =
    document.getElementById('following').files[0];

  const resultEl =
    document.getElementById('result');

  const messageEl =
    document.getElementById('message');

  resultEl.innerHTML = "";
  messageEl.innerHTML = "";

  if (!followersFile || !followingFile) {
    alert("Please upload both JSON files.");
    return;
  }

  try {

    const followers =
      await readJSON(followersFile);

    const following =
      await readJSON(followingFile);

    console.log("Followers Data:", followers);
    console.log("Following Data:", following);

    // -------------------------
    // Parse followers
    // -------------------------

    const followersSet = new Set();

    const followersData =
      followers.relationships_followers || followers;

    for (const entry of followersData || []) {

      for (const item of entry.string_list_data || []) {

        if (item.value) {
          followersSet.add(item.value);
        }

      }

    }

    // -------------------------
    // Parse following
    // -------------------------

    const followingSet = new Set();

    const followingData =
      following.relationships_following || following;

    for (const entry of followingData || []) {

      for (const item of entry.string_list_data || []) {

        if (item.value) {
          followingSet.add(item.value);
        }

      }

    }

    // -------------------------
    // Find users who don't follow back
    // -------------------------

    const nonFollowBack = [...followingSet]
      .filter(user => !followersSet.has(user))
      .sort((a, b) => a.localeCompare(b));

    // -------------------------
    // Display results
    // -------------------------

    if (nonFollowBack.length === 0) {

      messageEl.textContent =
        "Everyone you're following follows you back 😊";

      return;
    }

    messageEl.textContent =
      `${nonFollowBack.length} users don't follow you back`;

    for (const user of nonFollowBack) {

      const li = document.createElement("li");

      // Instagram profile link
      const link = document.createElement("a");

      link.className = "username";
      link.textContent = user;

      // FIXED LINK
      link.href =
        "https://www.instagram.com/" +
        encodeURIComponent(user);

      link.target = "_blank";
      link.rel = "noopener noreferrer";

      // Copy button
      const btn = document.createElement("button");

      btn.textContent = "Copy";
      btn.className = "copy-btn";

      btn.onclick = async (e) => {

        e.preventDefault();

        try {

          await navigator.clipboard.writeText(user);

          const oldText = btn.textContent;

          btn.textContent = "Copied!";

          setTimeout(() => {
            btn.textContent = oldText;
          }, 1000);

        } catch (err) {

          alert("Copy failed");

          console.error(err);

        }

      };

      li.appendChild(link);
      li.appendChild(btn);

      resultEl.appendChild(li);

    }

  } catch (error) {

    console.error(error);

    alert(
      "Error reading files.\n\n" +
      "Make sure you uploaded the correct Instagram JSON files."
    );

  }

}

// -------------------------
// Read JSON File
// -------------------------

function readJSON(file) {

  return new Promise((resolve, reject) => {

    const reader = new FileReader();

    reader.onload = () => {

      try {

        const parsed =
          JSON.parse(reader.result);

        resolve(parsed);

      } catch (err) {

        reject(err);

      }

    };

    reader.onerror = () => reject(reader.error);

    reader.readAsText(file);

  });

}

</script>

</body>
</html>
